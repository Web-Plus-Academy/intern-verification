<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Verification Panel | Saredufy Web Plus Academy</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="company-branding">
                <img src="swpalogo.png" alt="Saredufy WPA Logo" class="company-logo">
                <h2>Saredufy Web Plus Academy</h2>
                <span class="pvt-ltd">Pvt. Ltd.</span>
            </div>
            <h1><i class="fa-solid fa-certificate"></i> Official Verification Panel</h1>
            <p>Verify the authenticity of internship certificates issued by Saredufy WPA.</p>
        </header>

        <section class="controls" id="dashboardControls">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by Intern ID, Email, or Name...">
            </div>
            <div class="filters">
                <select id="domainFilter">
                    <option value="all">All Programs</option>
                    <option value="Full Stack Development">Full Stack Development</option>
                    <option value="Frontend Development">Frontend Development</option>
                    <option value="Backend Development">Backend Development</option>
                    <option value="UI & UX Designing">UI / UX Designing</option>
                    <option value="Cyber Security">Cyber Security</option>
                    <option value="Ai / Machine Learning">Ai / Machine Learning</option>
                </select>
            </div>
        </section>

        <main id="internsGrid" class="interns-grid">
            <!-- Cards will be injected here via JavaScript -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
